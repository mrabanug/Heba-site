<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تغيير كلمة المرور - لوحة التحكم</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#324A3E,#2D3E34);font-family:'Segoe UI',Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{background:#fff;padding:40px;border-radius:25px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.container h1{text-align:center;color:#324A3E;margin-bottom:10px;}
.container p{text-align:center;color:#7f8c8d;margin-bottom:30px;font-size:14px;}
label{display:block;margin-bottom:6px;font-weight:600;color:#324A3E;}
input{width:100%;padding:14px;border-radius:12px;border:1px solid #e5e0d4;background:#faf8f2;font-size:14px;margin-bottom:15px;}
input:focus{outline:none;border-color:#A89676;}
button{width:100%;padding:16px;border:none;border-radius:50px;background:linear-gradient(135deg,#A89676,#c2ad86);color:#fff;font-size:18px;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{opacity:0.9;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.error-msg{color:#c0392b;font-size:13px;text-align:center;margin-top:10px;display:none;}
.success-msg{color:#27ae60;font-size:13px;text-align:center;margin-top:10px;display:none;}
.loader{width:18px;height:18px;border:3px solid #fff;border-top:3px solid #A89676;border-radius:50%;display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
.back-link{display:block;text-align:center;margin-top:15px;color:#A89676;text-decoration:none;font-size:13px;}
.back-link:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="container">
    <h1>🔑 تغيير كلمة المرور</h1>
    <p>أدخل كلمة المرور الحالية ثم الجديدة لتحديثها</p>
    
    <form id="changePasswordForm" onsubmit="handleChangePassword(event)">
        <label>كلمة المرور الحالية</label>
        <input type="password" id="oldPassword" placeholder="أدخل كلمة المرور الحالية" required>
        
        <label>كلمة المرور الجديدة</label>
        <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة (4 أحرف على الأقل)" minlength="4" required>
        
        <label>تأكيد كلمة المرور الجديدة</label>
        <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور الجديدة" required>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        
        <button type="submit" id="changeBtn">🔒 تغيير كلمة المرور</button>
        
        <a href="login.html" class="back-link">🔙 العودة إلى تسجيل الدخول</a>
    </form>
</div>

<script>
// 🔴 استبدلي هذا الرابط بالرابط الذي نسخته من الخطوة 2.8
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxvym6Huzg1wDhVqB22obIvLkTOAzCxkQuhfcw5dSmNvpkex2A6wB9oFC4hZNqwyvbc/exec';

async function handleChangePassword(event) {
    event.preventDefault();
    
    const oldPassword = document.getElementById('oldPassword').value.trim();
    const newPassword = document.getElementById('newPassword').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const btn = document.getElementById('changeBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    
    if (!oldPassword || !newPassword || !confirmPassword) {
        errorMsg.textContent = '⚠️ الرجاء تعبئة جميع الحقول';
        errorMsg.style.display = 'block';
        return;
    }
    
    if (newPassword.length < 4) {
        errorMsg.textContent = '⚠️ كلمة المرور الجديدة يجب أن تكون 4 أحرف على الأقل';
        errorMsg.style.display = 'block';
        return;
    }
    
    if (newPassword !== confirmPassword) {
        errorMsg.textContent = '⚠️ كلمة المرور الجديدة وتأكيدها غير متطابقين';
        errorMsg.style.display = 'block';
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري التغيير...';
    
    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'changePassword', 
                oldPassword: oldPassword,
                newPassword: newPassword
            })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            successMsg.textContent = '✅ ' + result.message;
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            errorMsg.textContent = '❌ ' + result.message;
            errorMsg.style.display = 'block';
        }
    } catch (error) {
        errorMsg.textContent = '❌ حدث خطأ في الاتصال';
        errorMsg.style.display = 'block';
        console.error(error);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '🔒 تغيير كلمة المرور';
    }
}
</script>
</body>
</html>
