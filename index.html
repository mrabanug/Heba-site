<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>اختبار نهائي</title>
</head>
<body>
    <h2>اختبار الاتصال بالخادم</h2>
    <button onclick="testConnection()">اختبر الاتصال</button>
    <pre id="result" style="background:#eee; padding:10px; margin-top:10px;"></pre>

    <script>
        // الرابط الذي تستخدمينه في الموقع
        const TEST_URL = 'https://script.google.com/macros/s/AKfycbwwaRUyuEZlup1iGJcO7LRNX5jXEC54HKDjzvRGusIw1v9wcjtEwditiVRNvb44MxO5ng/exec';
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = '⏳ جاري الاتصال...';
            
            try {
                // محاولة الاتصال مع إضافة معلمة تاريخ وهمي
                const response = await fetch(`${TEST_URL}?date=2026-06-04`);
                const text = await response.text();
                resultDiv.innerText = '✅ تم الاتصال! \n\nالرد من الخادم:\n' + text;
            } catch (error) {
                resultDiv.innerText = '❌ فشل الاتصال: ' + error.message;
            }
        }
    </script>
</body>
</html>
