<!DOCTYPE html>
<html>
<body>
<button onclick="test()">اختبار</button>
<p id="result"></p>

<script>
async function test() {
  const result = document.getElementById('result');
  result.innerHTML = '⏳ جاري الاتصال...';
  
  try {
    const response = await fetch('https://script.google.com/macros/s/AKfycbwTgjyZMl3OdmfAhE37uFqSQxJpraXl3oWTTLSUMAJepDEwiKXxqB9w6B-nv-S5VPq0/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ test: true })
    });
    const data = await response.json();
    result.innerHTML = '✅ النتيجة: ' + JSON.stringify(data);
  } catch(error) {
    result.innerHTML = '❌ خطأ: ' + error.message;
  }
}
</script>
</body>
</html>
