<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>اختبار نهائي</title>
</head>
<body>
    <h2>اختبار الاتصال بالخادم الجديد</h2>
    <button onclick="testConnection()">اختبر الاتصال</button>
    <pre id="result" style="background:#eee; padding:10px; margin-top:10px;"></pre>

    <script>
        // الرابط الجديد
        const TEST_URL = 'https://script.google.com/macros/s/AKfycbzmTpYXMlvMKqSVDzQwUPopXIpslxnO1_b9wGjNa2444ADeLTY0dMzQ6Am_BCRIhg8yEA/exec';
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = '⏳ جاري الاتصال...';
            
            try {
                const response = await fetch(`${TEST_URL}?date=2026-06-04`);
                const data = await response.json();
                resultDiv.innerText = '✅ تم الاتصال بنجاح! \n\nالبيانات المستلمة:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerText = '❌ فشل الاتصال: ' + error.message;
            }
        }
    </script>
</body>
</html>
