<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الأوقات - هبة سالم</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        select, button { padding: 10px; margin: 10px; font-size: 16px; }
        pre { background:#f4f4f4; padding:15px; text-align:right; direction:ltr; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🧪 صفحة اختبار: جلب الأوقات المتاحة</h1>
    <p>هذا الاختبار للتحقق من اتصال الخادم الجديد</p>
    <label for="testDate">اختر تاريخ:</label>
    <input type="date" id="testDate">
    <button onclick="fetchTimes()">جلب الأوقات</button>
    <h3>النتيجة:</h3>
    <pre id="result">سيتم عرض الأوقات هنا...</pre>

    <script>
        // 👇 الرابط الجديد لتطبيق Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwaRUyuEZlup1iGJcO7LRNX5jXEC54HKDjzvRGusIw1v9wcjtEwditiVRNvb44MxO5ng/exec';

        async function fetchTimes() {
            const date = document.getElementById('testDate').value;
            if (!date) {
                alert("الرجاء اختيار تاريخ أولاً.");
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "⏳ جاري الاتصال بالخادم...";

            try {
                const url = `${SCRIPT_URL}?date=${date}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.status === "success") {
                    const booked = data.bookedTimes || {};
                    const allTimes = data.allTimes || [];

                    const availableTimes = allTimes.filter(time => !booked[time]);

                    let output = `✅ تم بنجاح! الأوقات المتاحة ليوم ${date}:\n\n`;
                    if (availableTimes.length === 0) {
                        output += "🚫 لا توجد أوقات متاحة.";
                    } else {
                        output += availableTimes.join("\n");
                    }
                    output += `\n\n📊 الإجمالي: ${availableTimes.length} وقت متاح`;
                    resultDiv.innerText = output;
                } else {
                    resultDiv.innerText = `❌ فشل: ${data.message || "خطأ غير معروف"}`;
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerText = `❌ خطأ في الاتصال: ${error.message}`;
            }
        }
    </script>
</body>
</html>
