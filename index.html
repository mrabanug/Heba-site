<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار رفع الصور - هبة سالم</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F7F5EB;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;padding:40px 20px;}
.container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.05);}
h1{color:#324A3E;margin-bottom:20px;text-align:center;}
label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold;color:#324A3E;}
input,textarea{width:100%;padding:12px;border:1.5px solid #e0ddd0;border-radius:12px;background:#F7F5EB;}
.submit{width:100%;background:#324A3E;color:white;padding:16px;border:none;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px;}
.submit:hover{background:#2D2D2A;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#324A3E;color:white;padding:15px 30px;border-radius:50px;display:none;z-index:1000;}
.toast.error{background:#c0392b;}
.loader{display:inline-block;width:20px;height:20px;border:3px solid #f3f3f3;border-top:3px solid #A89676;border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="container">
    <h1>🧪 اختبار رفع الصور</h1>
    <p style="text-align:center; color:#7f8c8d; margin-bottom:20px;">هذه نسخة تجريبية لاختبار وصول الصور إلى الإيميل</p>
    
    <label>الاسم الكامل</label>
    <input type="text" id="name" placeholder="الاسم الكامل">
    
    <label>رقم الهاتف</label>
    <input type="text" id="phone" placeholder="رقم الهاتف">
    
    <label>📸 صورة الشعر (اختر صورة)</label>
    <input type="file" id="hairImage" accept="image/*">
    
    <label>🩺 التحليل الطبي (اختر صورة أو PDF)</label>
    <input type="file" id="medicalReport" accept="image/*,.pdf">
    
    <button class="submit" id="sendBtn">📤 إرسال الاختبار</button>
</div>

<div id="toast" class="toast"></div>

<script>
// تهيئة EmailJS
emailjs.init('k_uVBPGLWFluR9_gn');

const SERVICE_ID = 'service_7zs119e';
const ADMIN_TEMPLATE = 'template_5n5fn1o';

function showMessage(text, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 5000);
}

// تحويل الملف إلى Base64
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

document.getElementById('sendBtn').onclick = async function() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const hairImageFile = document.getElementById('hairImage').files[0];
    const medicalReportFile = document.getElementById('medicalReport').files[0];
    
    if (!name || !phone) {
        showMessage('⚠️ الرجاء تعبئة الاسم والهاتف', true);
        return;
    }
    
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري الإرسال...';
    
    try {
        // تحويل الصور إلى Base64
        let hairImageBase64 = '';
        let medicalReportBase64 = '';
        
        if (hairImageFile) {
            hairImageBase64 = await fileToBase64(hairImageFile);
            console.log('تم تحويل صورة الشعر');
        }
        if (medicalReportFile) {
            medicalReportBase64 = await fileToBase64(medicalReportFile);
            console.log('تم تحويل التحليل الطبي');
        }
        
        // بناء الإيميل HTML
        const emailHTML = `
            <div dir="rtl" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #F7F5EB; border-radius: 20px;">
                <div style="background: #324A3E; padding: 30px; text-align: center; border-radius: 20px 20px 0 0;">
                    <h1 style="color: #FFFFFF; margin: 0;">🧪 اختبار رفع الصور</h1>
                    <p style="color: #A89676; margin: 10px 0 0;">${new Date().toLocaleString('ar-EG')}</p>
                </div>
                <div style="background: white; padding: 25px; border-radius: 0 0 20px 20px;">
                    <h2 style="color: #324A3E; border-right: 4px solid #A89676; padding-right: 15px;">بيانات الاختبار</h2>
                    <table style="width: 100%; margin-top: 15px;">
                        <tr><td style="padding: 8px;"><strong>👤 الاسم:</strong></td><td style="padding: 8px;">${name}</td></tr>
                        <tr><td style="padding: 8px;"><strong>📞 الهاتف:</strong></td><td style="padding: 8px;">${phone}</td></tr>
                    </table>
                    
                    <h2 style="color: #324A3E; border-right: 4px solid #A89676; padding-right: 15px; margin-top: 25px;">📸 صورة الشعر</h2>
                    ${hairImageBase64 ? 
                        `<div style="text-align: center; margin-top: 15px;">
                            <img src="${hairImageBase64}" style="max-width: 100%; border-radius: 12px; border: 1px solid #e0ddd0;">
                            <p style="color: #27ae60; margin-top: 8px;">✅ تم رفع الصورة بنجاح</p>
                        </div>` : 
                        '<p style="color: #7f8c8d;">❌ لم يتم رفع صورة الشعر</p>'
                    }
                    
                    <h2 style="color: #324A3E; border-right: 4px solid #A89676; padding-right: 15px; margin-top: 25px;">🩺 التحليل الطبي</h2>
                    ${medicalReportBase64 ? 
                        `<div style="text-align: center; margin-top: 15px;">
                            <img src="${medicalReportBase64}" style="max-width: 100%; border-radius: 12px; border: 1px solid #e0ddd0;">
                            <p style="color: #27ae60; margin-top: 8px;">✅ تم رفع الملف بنجاح</p>
                        </div>` : 
                        '<p style="color: #7f8c8d;">❌ لم يتم رفع التحليل الطبي</p>'
                    }
                    
                    <hr style="margin: 25px 0; border: none; border-top: 1px solid #e0ddd0;">
                    <p style="text-align: center; color: #A89676; font-size: 12px;">هذا اختبار تجريبي - هبة سالم</p>
                </div>
            </div>
        `;
        
        // إرسال الإيميل
        const result = await emailjs.send(SERVICE_ID, ADMIN_TEMPLATE, {
            name: name,
            age: 'اختبار',
            phone: phone,
            problem: 'اختبار رفع الصور',
            pdf_link: emailHTML
        });
        
        console.log('Email sent:', result);
        showMessage('✅ تم الإرسال بنجاح! تفقد بريدك الإلكتروني');
        
        // تنظيف الحقول
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('hairImage').value = '';
        document.getElementById('medicalReport').value = '';
        
    } catch (error) {
        console.error('Error:', error);
        showMessage('❌ خطأ: ' + (error.text || 'يرجى المحاولة مرة أخرى'), true);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 إرسال الاختبار';
    }
};
</script>
</body>
</html>
