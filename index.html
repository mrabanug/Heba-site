<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الحجز - هبة سالم</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:linear-gradient(135deg,#F7F5EB,#EFE9DB);font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh;padding:20px;}
    .container{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:20px;box-shadow:0 10px 35px rgba(0,0,0,0.08);}
    h1{color:#324A3E;margin-bottom:20px;text-align:center;}
    label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold;color:#324A3E;}
    input,select{width:100%;padding:12px;border:1px solid #e5e0d4;border-radius:12px;background:#faf8f2;margin-bottom:10px;}
    button{width:100%;background:#324A3E;color:white;padding:14px;border:none;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:15px;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#324A3E;color:white;padding:12px 25px;border-radius:50px;display:none;z-index:999;}
    .toast.error{background:#c0392b;}
    .loader{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:#A89676;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .result{text-align:center;margin-top:15px;padding:10px;border-radius:10px;display:none;}
    .result.success{background:#d4edda;color:#155724;}
    .result.error{background:#f8d7da;color:#721c24;}
</style>
</head>
<body>

<div class="container">
    <h1>🧪 اختبار الإرسال</h1>
    <p style="text-align:center;color:#7f8c8d;margin-bottom:20px;">هذه صفحة اختبار بسيطة للتأكد من وصول البيانات</p>
    
    <label>الاسم الكامل</label>
    <input type="text" id="name" placeholder="الاسم">
    
    <label>رقم الهاتف</label>
    <input type="tel" id="phone" placeholder="0771234567">
    
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@gmail.com">
    
    <label>اختر الوقت</label>
    <select id="time">
        <option value="10">10:00 صباحاً</option>
        <option value="11">11:00 صباحاً</option>
        <option value="12">12:00 ظهراً</option>
        <option value="13">01:00 ظهراً</option>
        <option value="14">02:00 ظهراً</option>
    </select>
    
    <button id="sendBtn">📤 إرسال اختبار</button>
    <div id="result" class="result"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// الرابط الجديد
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQ9PvibYfOj5urOJHnGCcLjdlyv0KysqiGOwD26C3gxfoP-VsPBXe4Ih-3BxgjX2Nd/exec';

function showMessage(text, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);
}

document.getElementById('sendBtn').onclick = async () => {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const selectedHour = document.getElementById('time').value;
    const resultDiv = document.getElementById('result');
    
    if (!name || !phone || !email) {
        showMessage('⚠️ الرجاء تعبئة جميع الحقول', true);
        return;
    }
    
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري الإرسال...';
    resultDiv.style.display = 'none';
    
    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                phone: phone,
                email: email,
                selectedHour: selectedHour,
                test: true
            })
        });
        
        resultDiv.className = 'result success';
        resultDiv.innerHTML = '✅ تم الإرسال! يرجى فحص بريدك الإلكتروني (والبريد العشوائي).';
        resultDiv.style.display = 'block';
        showMessage('✅ تم الإرسال بنجاح!');
        
        // تنظيف الحقول
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('email').value = '';
        
    } catch (error) {
        console.error(error);
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '❌ فشل الإرسال: ' + error.message;
        resultDiv.style.display = 'block';
        showMessage('❌ فشل الإرسال', true);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 إرسال اختبار';
    }
};
</script>
</body>
</html>
