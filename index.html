
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Clinic System</title>
<style>
body{font-family:Tahoma;background:#f7f5eb;margin:0}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:15px;background:#324A3E;color:#fff;border:none;border-radius:30px;margin-top:15px}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>حجز استشارة</h2>

    <input id="name" placeholder="الاسم">
    <input id="phone" placeholder="الهاتف">
    <input id="email" placeholder="الإيميل">

    <input type="date" id="date" onchange="loadTimes()">
    <select id="time"></select>

    <button onclick="send()">حجز</button>
  </div>
</div>

<script>
const API="YOUR_SCRIPT_URL";

async function loadTimes(){
  let d=document.getElementById("date").value;
  let r=await fetch(API+"?date="+d);
  let j=await r.json();

  let t=document.getElementById("time");
  t.innerHTML="";
  j.slots.forEach(s=>{
    let o=document.createElement("option");
    o.value=s;
    o.textContent=s;
    t.appendChild(o);
  });
}

async function send(){
  let data={
    name:date.value,
    phone:phone.value,
    email:email.value,
    date:document.getElementById("date").value,
    time:document.getElementById("time").value
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify(data),
    headers:{"Content-Type":"text/plain"}
  });

  alert("Done");
}
</script>

</body>
</html>
