<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة التذكير - هبة سالم</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#F7F5EB;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;padding:40px 20px;}
    .container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.05);}
    h1{color:#324A3E;margin-bottom:20px;text-align:center;}
    label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold;color:#324A3E;}
    input,select{width:100%;padding:12px;border:1.5px solid #e0ddd0;border-radius:12px;background:#F7F5EB;margin-bottom:10px;}
    button{width:100%;background:#324A3E;color:white;padding:16px;border:none;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px;}
    button:hover{background:#2D2D2A;}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#324A3E;color:white;padding:15px 30px;border-radius:50px;display:none;z-index:1000;}
    .toast.error{background:#c0392b;}
    .loader{display:inline-block;width:20px;height:20px;border:3px solid #f3f3f3;border-top:3px solid #A89676;border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;}
    @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
    .test-badge{background:#A89676;color:white;padding:5px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:15px;}
    .note{background:#fff3cd;color:#856404;padding:10px;border-radius:8px;margin-top:15px;font-size:14px;text-align:center;}
</style>
</head>
<body>

<div class="container">
    <div class="test-badge">🧪 صفحة تجريبية - اختبار وصول رابط الميت</div>
    <h1>🔔 تجربة التذكير قبل الموعد</h1>
    
    <div class="note">
        ⏰ سيتم إرسال إيميلين:<br>
        1️⃣ إيميل تأكيد فوري<br>
        2️⃣ إيميل تذكير قبل الموعد بدقيقتين (يحتوي رابط Google Meet)
    </div>
    
    <label>الاسم الكامل</label>
    <input type="text" id="name" placeholder="الاسم">
    
    <label>رقم الهاتف</label>
    <input type="tel" id="phone" placeholder="0771234567">
    
    <label>📧 البريد الإلكتروني (للتجربة)</label>
    <input type="email" id="email" placeholder="example@gmail.com">
    
    <label>📅 التاريخ</label>
    <input type="date" id="date">
    
    <label>⏰ الوقت</label>
    <select id="time">
        <option value="">-- اختر الوقت --</option>
    </select>
    
    <div class="note" id="timeNote" style="display:none; margin-top:10px;">
        ✅ الوقت المختار مناسب للتجربة (سيتم إرسال التذكير بعد دقيقتين)
    </div>
    
    <button id="sendBtn">📤 إرسال تجربة التذكير</button>
</div>

<div id="toast" class="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPjv8IG8W2J0-uGl-JO9cezsmJJrWvGAuaaCiiZFRtXozID3NG0oBlMGnWQPqIaQAm/exec';
const MEET_LINK = 'https://meet.google.com/yyc-pgok-ztw';

function showMessage(text, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);
}

function formatTimeTo12Hour(time24) {
    if (!time24) return '';
    const [hours, minutes] = time24.split(':');
    let hour = parseInt(hours);
    const ampm = hour >= 12 ? 'ظهراً' : 'صباحاً';
    let displayHour = hour % 12;
    if (displayHour === 0) displayHour = 12;
    return `${displayHour}:${minutes} ${ampm}`;
}

// إنشاء الأوقات (كل ساعة من 00:00 إلى 23:00)
function populateTimes() {
    const timeSelect = document.getElementById('time');
    const now = new Date();
    const currentHour = now.getHours();
    const currentMinute = now.getMinutes();
    
    // وقت بعد دقيقتين
    const futureTime = new Date(now.getTime() + 2 * 60000);
    const futureHour = futureTime.getHours().toString().padStart(2, '0');
    const futureMinute = futureTime.getMinutes().toString().padStart(2, '0');
    const futureTimeString = `${futureHour}:${futureMinute}`;
    
    // إضافة الأوقات
    for (let i = 0; i < 24; i++) {
        const hour = i.toString().padStart(2, '0');
        const timeString = `${hour}:00`;
        const option = document.createElement('option');
        option.value = timeString;
        let displayText = formatTimeTo12Hour(timeString);
        
        if (timeString === futureTimeString) {
            displayText += ' (⏰ بعد دقيقتين - مثالي للتجربة)';
        }
        option.textContent = displayText;
        timeSelect.appendChild(option);
    }
    
    // تحديد الوقت المناسب تلقائياً (بعد دقيقتين)
    if (futureTimeString) {
        timeSelect.value = futureTimeString;
        document.getElementById('timeNote').style.display = 'block';
    }
}

// تعيين التاريخ (اليوم)
const today = new Date().toISOString().split('T')[0];
document.getElementById('date').value = today;
document.getElementById('date').min = '2023-01-01';

populateTimes();

document.getElementById('sendBtn').onclick = async () => {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const date = document.getElementById('date').value;
    const time24 = document.getElementById('time').value;
    
    if (!name || !phone || !email || !date || !time24) {
        showMessage('⚠️ الرجاء تعبئة جميع الحقول', true);
        return;
    }
    
    if (!email.includes('@')) {
        showMessage('⚠️ بريد إلكتروني غير صحيح', true);
        return;
    }
    
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري إرسال الطلب...';
    
    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                age: 'تجربة',
                phone: phone,
                email: email,
                date: date,
                time: time24,
                consultType: 'تجربة تذكير',
                notes: 'تجربة',
                water: '',
                hairLoss: 'لا',
                digestive: '', fatigue: '', nails: '', diet: '', quickDry: '', slowDry: '',
                hairImageUrl: '',
                medicalReportUrl: '',
                meetLink: MEET_LINK,
                referenceNumber: phone
            })
        });
        
        showMessage('✅ تم الإرسال! تفقد بريدك الإلكتروني، سيصلك تأكيد فوري وتذكير بعد دقيقتين.');
        
        // تنظيف الحقول
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('email').value = '';
        
    } catch (error) {
        console.error(error);
        showMessage('❌ حدث خطأ، حاول مرة أخرى', true);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 إرسال تجربة التذكير';
    }
};
</script>
</body>
</html>
