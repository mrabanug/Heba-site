<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>اختبار مع صور ImgBB</title>
</head>
<body>
<h2>اختبار رفع الصورة أولاً</h2>
<input type="file" id="imageFile" accept="image/*">
<button id="uploadBtn">رفع الصورة أولاً</button>
<button id="sendBtn" disabled>إرسال البيانات</button>
<p id="result"></p>

<script>
const IMGBB_KEY = 'd7d3d4f980737a479c46312bcb4ae4e7';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkFZCibtu2aN__bD7MJVE8bDp09kjW618Kb3cEB-PlJjznKjIQDHwIGmC0PfLiXLAK/exec';

let imageUrl = '';

document.getElementById('uploadBtn').onclick = async () => {
    const file = document.getElementById('imageFile').files[0];
    if (!file) { alert('اختر صورة أولاً'); return; }
    
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '⏳ جاري رفع الصورة...';
    
    const formData = new FormData();
    formData.append('image', file);
    formData.append('key', IMGBB_KEY);
    
    try {
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.success) {
            imageUrl = data.data.url;
            resultDiv.innerHTML = '✅ تم رفع الصورة: ' + imageUrl;
            document.getElementById('sendBtn').disabled = false;
        } else {
            resultDiv.innerHTML = '❌ فشل رفع الصورة';
        }
    } catch(e) {
        resultDiv.innerHTML = '❌ خطأ: ' + e.message;
    }
};

document.getElementById('sendBtn').onclick = async () => {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '⏳ جاري إرسال البيانات...';
    
    try {
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: 'اختبار',
                phone: '0771234567',
                email: 'test@example.com',
                imageUrl: imageUrl,
                test: true
            })
        });
        resultDiv.innerHTML = '✅ تم إرسال البيانات بنجاح!';
    } catch(e) {
        resultDiv.innerHTML = '❌ خطأ: ' + e.message;
    }
};
</script>
</body>
</html>
