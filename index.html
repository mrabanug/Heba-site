<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heba Salim | Trichologist</title>

<style>
:root{
  --dark-green:#2A3E34;
  --mid-green:#53675A;
  --cream:#F4F3EB;
  --gold:#A3937C;
  --gray:#D2CFC4;
  --white:#FFFFFF;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: var(--cream);
  color: var(--dark-green);
}

/* Hero Section */
.hero{
  background: linear-gradient(135deg,var(--dark-green),var(--mid-green));
  color: var(--white);
  padding: 80px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
  letter-spacing:1px;
}

.hero p{
  font-size:18px;
  opacity:0.9;
}

/* floating effect */
.hero::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:var(--gold);
  opacity:0.15;
  border-radius:50%;
  top:-50px;
  left:-80px;
  animation: float 6s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(30px);}
}

/* Card */
.card{
  background:var(--white);
  max-width:600px;
  margin:-50px auto 20px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  border:1px solid var(--gray);
}

.card h2{
  margin-bottom:10px;
  color:var(--dark-green);
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid var(--gray);
  border-radius:10px;
  outline:none;
}

button{
  background:var(--dark-green);
  color:var(--white);
  padding:12px;
  border:none;
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:var(--mid-green);
}

/* WhatsApp Button */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.whatsapp:hover{
  transform:scale(1.1);
}

/* footer */
footer{
  text-align:center;
  padding:20px;
  color:var(--mid-green);
  font-size:14px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Heba Salim</h1>
  <p>اختصاص علم الشعر | Trichologist</p>
</div>

<div class="card">
  <h2>احجزي استشارتك الآن</h2>
  
  <input type="text" placeholder="الاسم الكامل">
  <input type="tel" placeholder="رقم الهاتف">
  <textarea rows="4" placeholder="اكتبي مشكلتك بالتفصيل..."></textarea>
  
  <button onclick="sendToWhatsApp()">إرسال عبر واتساب</button>
</div>

<footer>
  برمجة: محمد العزاوي
</footer>

<a class="whatsapp" 
   href="https://wa.me/9647762243091" 
   target="_blank">
   واتساب
</a>

<script>
function sendToWhatsApp(){
  const name = document.querySelector('input[type="text"]').value;
  const phone = document.querySelector('input[type="tel"]').value;
  const msg = document.querySelector('textarea').value;

  const text = `اسم: ${name}%0Aرقم: ${phone}%0Aرسالة: ${msg}`;

  window.open(`https://wa.me/9647762243091?text=${text}`, '_blank');
}
</script>

</body>
</html>
