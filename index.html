<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هبة سالم | Trichologist</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#F7F5EB;
    color:#2D2D2A;
}

/* HERO */
.hero{
    background:#324A3E;
    color:#FFFFFF;
    text-align:center;
    padding:75px 20px;
}

.hero h1{
    margin:0;
    font-size:36px;
    font-weight:bold;
}

.hero p{
    margin-top:10px;
    font-size:16px;
    color:#A89676;
}

/* BUTTON */
.hero button{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#A89676;
    color:#FFFFFF;
    font-weight:bold;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:850px;
    margin:auto;
    padding:20px;
}

/* BOX */
.box{
    background:#FFFFFF;
    margin:18px 0;
    padding:22px;
    border-radius:14px;
    box-shadow:0 0 10px rgba(0,0,0,0.06);
    border-right:5px solid #324A3E;
}

h2{
    color:#324A3E;
    margin-bottom:15px;
}

/* INPUTS */
input, select, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
    outline:none;
    background:#F7F5EB;
    color:#2D2D2A;
}

input:focus, textarea:focus, select:focus{
    border-color:#A89676;
}

/* SUBMIT */
.submit{
    width:100%;
    background:#324A3E;
    color:#FFFFFF;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

.submit:hover{
    background:#2D2D2A;
}

/* REVIEWS */
.review{
    background:#F7F5EB;
    padding:12px;
    margin:10px 0;
    border-right:4px solid #A89676;
    border-radius:8px;
    font-size:14px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>هبة سالم</h1>
    <p>اختصاص علم الشعر | Trichologist</p>
    <button onclick="document.getElementById('form').scrollIntoView({behavior:'smooth'})">
        ابدئي الاستشارة الآن
    </button>
</div>

<div class="container">

<!-- FORM -->
<div class="box" id="form">
<h2>📋 استمارة التشخيص</h2>

<input type="text" id="name" placeholder="الاسم الكامل">
<input type="number" id="age" placeholder="العمر">
<input type="text" id="phone" placeholder="رقم الهاتف">

<select id="water">
    <option>كمية شرب الماء يومياً</option>
    <option>أقل من لتر</option>
    <option>1 - 2 لتر</option>
    <option>أكثر من 2 لتر</option>
</select>

<input type="text" id="hairType" placeholder="نوع الشعر (دهني / جاف / مختلط)">

<textarea id="problem" placeholder="اكتب مشكلة الشعر بالتفصيل"></textarea>

<button class="submit" onclick="sendWhatsApp()">إرسال عبر واتساب</button>
</div>

<!-- REVIEWS -->
<div class="box">
<h2>⭐ آراء العملاء</h2>

<div class="review">نتائج ممتازة وتحسن واضح من أول متابعة</div>
<div class="review">استشارة دقيقة وفهم عميق للمشكلة</div>
<div class="review">خدمة احترافية أنصح بها</div>

</div>

<!-- BOOKING -->
<div class="box">
<h2>📅 حجز موعد</h2>
<p>يمكنك التواصل مباشرة عبر واتساب لحجز موعد</p>

<button class="submit" onclick="bookNow()">
حجز موعد الآن
</button>
</div>

</div>

<script>
function sendWhatsApp(){
    let message =
`📋 استمارة جديدة:
👤 الاسم: ${name.value}
🎂 العمر: ${age.value}
📞 الهاتف: ${phone.value}
💧 الماء: ${water.value}
💇‍♀️ نوع الشعر: ${hairType.value}
🧴 المشكلة: ${problem.value}`;

    window.open(
        "https://wa.me/9647762243091?text=" + encodeURIComponent(message),
        "_blank"
    );
}

function bookNow(){
    let msg = "أرغب بحجز موعد استشارة شعر";
    window.open(
        "https://wa.me/9647762243091?text=" + encodeURIComponent(msg),
        "_blank"
    );
}
</script>

</body>
</html>
