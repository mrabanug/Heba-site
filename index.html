<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة رفع الصور - هبة سالم</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F7F5EB;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;padding:40px 20px;}
.container{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.05);}
h1{color:#324A3E;margin-bottom:20px;text-align:center;}
label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold;color:#324A3E;}
input{width:100%;padding:12px;border:1.5px solid #e0ddd0;border-radius:12px;background:#F7F5EB;}
button{width:100%;background:#324A3E;color:white;padding:16px;border:none;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px;}
button:hover{background:#2D2D2A;}
.result{background:#F7F5EB;padding:15px;border-radius:12px;margin-top:20px;display:none;}
.result a{color:#324A3E;word-break:break-all;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#324A3E;color:white;padding:15px 30px;border-radius:50px;display:none;z-index:1000;}
.toast.error{background:#c0392b;}
.loader{display:inline-block;width:20px;height:20px;border:3px solid #f3f3f3;border-top:3px solid #A89676;border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="container">
    <h1>🧪 تجربة رفع الصور</h1>
    <p style="text-align:center; color:#7f8c8d; margin-bottom:20px;">اختر صورة وسيتم رفعها إلى ImgBB</p>
    
    <label>📸 اختر صورة</label>
    <input type="file" id="imageFile" accept="image/jpeg,image/png,image/jpg">
    
    <button id="uploadBtn">📤 رفع الصورة</button>
    
    <div id="result" class="result">
        <h3>✅ تم الرفع بنجاح</h3>
        <p><strong>رابط الصورة:</strong></p>
        <a href="#" id="imageLink" target="_blank"></a>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const IMGBB_API_KEY = 'd7d3d4f980737a479c46312bcb4ae4e7';

function showMessage(text, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

document.getElementById('uploadBtn').onclick = async function() {
    const file = document.getElementById('imageFile').files[0];
    
    if (!file) {
        showMessage('⚠️ الرجاء اختيار صورة أولاً', true);
        return;
    }
    
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري الرفع...';
    
    try {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            const imageUrl = result.data.url;
            
            document.getElementById('imageLink').href = imageUrl;
            document.getElementById('imageLink').textContent = imageUrl;
            document.getElementById('result').style.display = 'block';
            
            showMessage('✅ تم رفع الصورة بنجاح!');
        } else {
            throw new Error(result.error?.message || 'فشل الرفع');
        }
        
    } catch (error) {
        console.error(error);
        showMessage('❌ خطأ: ' + error.message, true);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 رفع الصورة';
    }
};
</script>
</body>
</html>
