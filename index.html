<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>اختبار بسيط</title>
</head>
<body>
<h2>اختبار إرسال البيانات</h2>
<label>الاسم:</label>
<input type="text" id="name">
<label>الهاتف:</label>
<input type="text" id="phone">
<button id="testBtn">إرسال اختبار</button>
<p id="result"></p>

<script>
const TEST_URL = 'https://script.google.com/macros/s/AKfycbzkFZCibtu2aN__bD7MJVE8bDp09kjW618Kb3cEB-PlJjznKjIQDHwIGmC0PfLiXLAK/exec';

document.getElementById('testBtn').onclick = async function() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!name || !phone) {
        resultDiv.innerHTML = '⚠️ الرجاء تعبئة الاسم والهاتف';
        resultDiv.style.color = 'red';
        return;
    }
    
    resultDiv.innerHTML = '⏳ جاري الإرسال...';
    
    try {
        const response = await fetch(TEST_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                phone: phone,
                test: true
            })
        });
        
        resultDiv.innerHTML = '✅ تم الإرسال! (تم الرفع إلى السحابة)';
        resultDiv.style.color = 'green';
        
    } catch (error) {
        resultDiv.innerHTML = '❌ خطأ: ' + error.message;
        resultDiv.style.color = 'red';
        console.error(error);
    }
};
</script>
</body>
</html>
