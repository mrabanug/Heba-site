<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار بسيط</title>
<style>
    body{font-family:Arial;padding:20px;text-align:center;}
    input,button{padding:10px;margin:10px;font-size:16px;}
</style>
</head>
<body>
    <h2>🧪 اختبار إرسال البيانات</h2>
    <input type="text" id="name" placeholder="الاسم">
    <input type="tel" id="phone" placeholder="الهاتف">
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <button onclick="send()">إرسال</button>
    <p id="result"></p>

    <script>
    const URL = 'https://script.google.com/macros/s/AKfycbxwthhOYpTnj_iTslYbVYScOmR47PstD8hZL_hkNpEMkhOi4FwrLJi8VECaVWx8t1MY/exec';

    async function send() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const result = document.getElementById('result');
        
        if (!name || !phone || !email) {
            result.innerHTML = '⚠️ الرجاء تعبئة جميع الحقول';
            return;
        }
        
        result.innerHTML = '⏳ جاري الإرسال...';
        
        try {
            // استخدام no-cors لتجاوز مشاكل CORS
            await fetch(URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, email })
            });
            result.innerHTML = '✅ تم الإرسال! يرجى فحص بريدك الإلكتروني (والبريد العشوائي).';
            
            // تنظيف الحقول
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('email').value = '';
        } catch(error) {
            result.innerHTML = '❌ خطأ: ' + error.message;
        }
    }
    </script>
</body>
</html>
