<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار الإيميلات - هبة سالم</title>
    <style>
        body{font-family:Arial;padding:20px;text-align:center;}
        input,button{padding:10px;margin:10px;font-size:16px;}
        .success{color:green;}
        .error{color:red;}
    </style>
</head>
<body>
    <h2>🧪 صفحة اختبار إرسال الإيميلات</h2>
    <p>هذا الاختبار سيرسل إيميلاً لك وللمسؤول عبر التطبيق الجديد.</p>
    
    <label>📧 بريدك الإلكتروني:</label>
    <input type="email" id="email" placeholder="example@gmail.com">
    <br>
    <label>👤 الاسم:</label>
    <input type="text" id="name" placeholder="اسمك">
    <br>
    <button onclick="sendTest()">📤 إرسال اختبار</button>
    <div id="result"></div>

    <script>
        // الرابط الجديد
        const TEST_URL = 'https://script.google.com/macros/s/AKfycbzJ4-YHsCtNC_HnVeByTjEPXNgFFDE_vgs3DYf6X6a9Pvr4BThrgbQMi4i8kON2xJ9I/exec';

        async function sendTest() {
            const email = document.getElementById('email').value.trim();
            const name = document.getElementById('name').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!email || !name) {
                resultDiv.innerHTML = '<p class="error">⚠️ الرجاء إدخال البريد والاسم</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p>⏳ جاري الإرسال...</p>';
            
            try {
                const response = await fetch(TEST_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email })
                });
                
                resultDiv.innerHTML = '<p class="success">✅ تم الإرسال! يرجى فحص بريدك الإلكتروني (والبريد العشوائي).</p>';
                
                // تنظيف الحقول
                document.getElementById('email').value = '';
                document.getElementById('name').value = '';
                
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ خطأ: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
