<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة رفع صورتين - طريقة مباشرة</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F7F5EB;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;padding:40px 20px;}
.container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.05);}
h1{color:#324A3E;margin-bottom:20px;text-align:center;}
label{display:block;margin-top:15px;margin-bottom:5px;font-weight:bold;color:#324A3E;}
input,textarea{width:100%;padding:12px;border:1.5px solid #e0ddd0;border-radius:12px;background:#F7F5EB;font-family:inherit;}
button{width:100%;background:#324A3E;color:white;padding:16px;border:none;border-radius:40px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px;}
button:hover{background:#2D2D2A;}
.preview{display:flex;gap:15px;margin-top:15px;flex-wrap:wrap;}
.preview img{width:100px;height:100px;object-fit:cover;border-radius:12px;border:2px solid #A89676;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#324A3E;color:white;padding:15px 30px;border-radius:50px;display:none;z-index:1000;text-align:center;}
.toast.error{background:#c0392b;}
.loader{display:inline-block;width:20px;height:20px;border:3px solid #f3f3f3;border-top:3px solid #A89676;border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="container">
    <h1>🧪 تجربة رفع صورتين</h1>
    <p style="text-align:center; color:#7f8c8d; margin-bottom:20px;">اختر صورتين وسيتم إرسال روابطهما إلى بريدك</p>
    
    <label>👤 الاسم</label>
    <input type="text" id="name" placeholder="الاسم الكامل">
    
    <label>📞 رقم الهاتف</label>
    <input type="text" id="phone" placeholder="رقم الهاتف">
    
    <label>📸 صورة الشعر</label>
    <input type="file" id="hairImage" accept="image/jpeg,image/png,image/jpg">
    
    <label>🩺 التحليل الطبي</label>
    <input type="file" id="medicalReport" accept="image/jpeg,image/png,image/jpg">
    
    <div class="preview" id="preview"></div>
    
    <button id="sendBtn">📤 رفع الصور وإرسال الإيميل</button>
</div>

<div id="toast" class="toast"></div>

<script>
emailjs.init('k_uVBPGLWFluR9_gn');

const SERVICE_ID = 'service_7zs119e';
const ADMIN_TEMPLATE = 'template_5n5fn1o';
const IMGBB_API_KEY = 'd7d3d4f980737a479c46312bcb4ae4e7';

function showMessage(text, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 5000);
}

function previewImages() {
    const preview = document.getElementById('preview');
    preview.innerHTML = '';
    
    const hairFile = document.getElementById('hairImage').files[0];
    const medicalFile = document.getElementById('medicalReport').files[0];
    
    if (hairFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.title = 'صورة الشعر';
            preview.appendChild(img);
        };
        reader.readAsDataURL(hairFile);
    }
    
    if (medicalFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.title = 'التحليل الطبي';
            preview.appendChild(img);
        };
        reader.readAsDataURL(medicalFile);
    }
}

document.getElementById('hairImage').addEventListener('change', previewImages);
document.getElementById('medicalReport').addEventListener('change', previewImages);

async function uploadToImgBB(file) {
    const formData = new FormData();
    formData.append('image', file);
    formData.append('key', IMGBB_API_KEY);
    
    const response = await fetch('https://api.imgbb.com/1/upload', {
        method: 'POST',
        body: formData
    });
    
    const result = await response.json();
    if (result.success) {
        return result.data.url;
    } else {
        throw new Error(result.error?.message || 'فشل رفع الصورة');
    }
}

document.getElementById('sendBtn').onclick = async function() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const hairFile = document.getElementById('hairImage').files[0];
    const medicalFile = document.getElementById('medicalReport').files[0];
    
    if (!name || !phone) {
        showMessage('⚠️ الرجاء تعبئة الاسم والهاتف', true);
        return;
    }
    
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري رفع الصور...';
    
    try {
        showMessage('⏳ جاري رفع الصور...');
        
        let hairUrl = null;
        let medicalUrl = null;
        
        if (hairFile) {
            hairUrl = await uploadToImgBB(hairFile);
        }
        if (medicalFile) {
            medicalUrl = await uploadToImgBB(medicalFile);
        }
        
        // بناء نص الإيميل بشكل مباشر وبسيط
        const emailContent = `
الاسم: ${name}
الهاتف: ${phone}
التاريخ: ${new Date().toLocaleString('ar-EG')}

================================

📸 صورة الشعر:
${hairUrl || 'لم يتم رفع صورة الشعر'}

🩺 التحليل الطبي:
${medicalUrl || 'لم يتم رفع التحليل الطبي'}

================================

هذا إرسال تجريبي من هبة سالم
        `;
        
        // إرسال الإيميل
        await emailjs.send(SERVICE_ID, ADMIN_TEMPLATE, {
            name: name,
            age: 'تجربة',
            phone: phone,
            problem: emailContent,
            pdf_link: emailContent
        });
        
        showMessage(`✅ تم الإرسال!\nصورة الشعر: ${hairUrl || 'لا يوجد'}\nالتحليل: ${medicalUrl || 'لا يوجد'}`);
        
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('hairImage').value = '';
        document.getElementById('medicalReport').value = '';
        document.getElementById('preview').innerHTML = '';
        
    } catch (error) {
        console.error(error);
        showMessage('❌ خطأ: ' + error.message, true);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 رفع الصور وإرسال الإيميل';
    }
};
</script>
</body>
</html>
